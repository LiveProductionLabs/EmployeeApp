  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1e2a3a; --surface: #263447; --surface2: #2f3f55;
      --border: #3a5068; --accent: #38bdf8; --accent2: #818cf8;
      --text: #f0f4f8; --text2: #94a3b8;
      --success: #4ade80; --warning: #fbbf24; --danger: #f87171;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
    #loading { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 4px; color: var(--accent); }

    .topnav { background: #182230; border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; height: 56px; gap: 12px; position: sticky; top: 0; z-index: 50; }
    .nav-back { background: none; border: 1px solid var(--border); color: var(--text2); font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 12px; border-radius: 6px; cursor: pointer; text-decoration: none; }
    .nav-back:hover { border-color: var(--accent); color: var(--accent); }
    .nav-bar { width: 5px; height: 32px; background: linear-gradient(180deg,var(--accent),var(--accent2)); border-radius: 3px; }
    .nav-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; flex: 1; }

    .main { padding: 20px; max-width: 700px; margin: 0 auto; padding-bottom: 80px; }

    /* JOB SELECTOR */
    .job-select-wrap { margin-bottom: 20px; }
    .form-label { display: block; font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .form-select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 12px 14px; outline: none; -webkit-appearance: none; }
    .form-select:focus { border-color: var(--accent); }

    /* UPLOAD AREA */
    .upload-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 24px; }
    .upload-zone { border: 2px dashed var(--border); border-radius: 10px; text-align: center; padding: 28px 16px; cursor: pointer; position: relative; transition: all 0.2s; }
    .upload-zone:hover { border-color: var(--accent); background: #1e2e42; }
    .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { font-size: 36px; margin-bottom: 8px; }
    .upload-text { font-size: 13px; color: var(--text2); }
    .upload-text span { color: var(--accent); font-weight: 500; }
    .caption-row { display: flex; gap: 10px; margin-top: 14px; }
    .caption-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 10px 14px; outline: none; }
    .caption-input:focus { border-color: var(--accent); }
    .btn-upload { background: linear-gradient(135deg,var(--accent),var(--accent2)); border: none; border-radius: 8px; color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 2px; padding: 10px 20px; cursor: pointer; white-space: nowrap; }
    .btn-upload:disabled { opacity: 0.4; cursor: not-allowed; }

    /* PENDING PREVIEWS */
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px,1fr)); gap: 8px; margin-top: 14px; }
    .preview-item { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 1; background: var(--bg); border: 1px solid var(--border); }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .preview-remove { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.75); border: none; color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    .msg { padding: 10px 14px; border-radius: 8px; font-size: 12px; margin-top: 12px; display: none; }
    .msg-success { background: #0f291866; border: 1px solid #166534; color: var(--success); display: block; }
    .msg-error   { background: #3b0a0a66; border: 1px solid #7f1d1d; color: var(--danger); display: block; }

    /* GALLERY */
    .gallery-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--accent); flex: 1; }
    .photo-count { font-size: 11px; color: var(--text2); }

    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 12px; }
    .photo-tile { border-radius: 10px; overflow: hidden; background: var(--surface); border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s, border-color 0.15s; }
    .photo-tile:hover { transform: scale(1.02); border-color: var(--accent); }
    .photo-tile img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
    .photo-tile-meta { padding: 8px 10px; }
    .photo-caption { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .photo-by { font-size: 10px; color: var(--text2); margin-top: 2px; }

    /* JOB GROUP */
    .job-group { margin-bottom: 28px; }
    .job-group-header { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 12px; }
    .job-group-name { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--text); }
    .job-group-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 12px; }

    /* LIGHTBOX */
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 300; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 100%; max-height: 75vh; border-radius: 10px; object-fit: contain; }
    .lightbox-meta { margin-top: 14px; text-align: center; }
    .lightbox-caption { font-size: 14px; color: var(--text); }
    .lightbox-by { font-size: 11px; color: var(--text2); margin-top: 4px; }
    .lightbox-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #fff; font-size: 32px; cursor: pointer; line-height: 1; }
    .lightbox-delete { margin-top: 16px; background: transparent; border: 1px solid var(--danger); border-radius: 8px; color: var(--danger); font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 1px; padding: 8px 20px; cursor: pointer; display: none; }
  </style>
</head>
<body>
<div id="loading">LOADING...</div>

<nav class="topnav">
  <a class="nav-back" href="index.html">← Hub</a>
  <div class="nav-bar"></div>
  <div class="nav-title">Project Photos</div>
</nav>

<div class="main">

  <!-- UPLOAD SECTION -->
  <div class="upload-card">
    <div class="job-select-wrap">
      <label class="form-label">Select Job</label>
      <select class="form-select" id="job-select" onchange="onJobSelect()">
        <option value="">— Choose a job —</option>
      </select>
    </div>

    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="image/*" capture="environment" multiple onchange="handleFiles(this.files)" />
      <div class="upload-icon">📸</div>
      <div class="upload-text">Tap to <span>take a photo</span> or <span>choose from library</span></div>
    </div>

    <div class="preview-grid" id="preview-grid"></div>

    <div class="caption-row" id="caption-row" style="display:none;">
      <input class="caption-input" id="caption-input" type="text" placeholder="Add a caption (optional)..." />
      <button class="btn-upload" id="btn-upload" onclick="uploadPhotos()">UPLOAD</button>
    </div>
    <div id="upload-msg"></div>
  </div>

  <!-- GALLERY -->
  <div class="gallery-header">
    <div class="section-title">All Photos</div>
    <div class="photo-count" id="photo-count"></div>
  </div>
  <div id="gallery"><div class="empty-state">Loading photos...</div></div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt="" />
  <div class="lightbox-meta">
    <div class="lightbox-caption" id="lb-caption"></div>
    <div class="lightbox-by" id="lb-by"></div>
  </div>
  <button class="lightbox-delete" id="lb-delete" onclick="deletePhoto()">🗑 Delete Photo</button>
</div>

<script>
const SUPABASE_URL  = 'https://xfpgbjxavymtfmfobecc.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmcGdianhhdnltdGZtZm9iZWNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMTkzODgsImV4cCI6MjA4ODY5NTM4OH0.cDc9jrafj6PnpDE7OTcgujKrHjb5NMdQWPi7EmFMomY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const BUCKET = 'project-photos';

let currentUser = null;
let isOwner     = false;
let myJobs      = [];   // jobs this employee is on (or all if owner)
let allEmployees = [];
let pendingFiles = [];
let currentPhoto = null;  // for lightbox delete

// ── HELPERS ───────────────────────────────────────────────
function slugify(str) {
  return (str||'').trim().replace(/[^a-zA-Z0-9]/g, '_').replace(/_+/g,'_').substring(0,40);
}
function buildFolder(job) {
  const client = slugify(job.client_name || job.clients?.company_name || 'NoClient');
  const date   = (job.start_date || '').substring(0,10);
  const name   = slugify(job.job_name);
  return `${client}_${date}_${name}`;
}
function fmtDT(ts) {
  return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
}

// ── FILE HANDLING ─────────────────────────────────────────
function handleFiles(files) {
  [...files].forEach(f => { if(pendingFiles.length < 20 && f.type.startsWith('image/')) pendingFiles.push(f); });
  renderPreviews();
  document.getElementById('file-input').value = '';
}
function renderPreviews() {
  const grid = document.getElementById('preview-grid');
  const captionRow = document.getElementById('caption-row');
  grid.innerHTML = pendingFiles.map((f,i) => `
    <div class="preview-item">
      <img src="${URL.createObjectURL(f)}" />
      <button class="preview-remove" onclick="removeFile(${i})">✕</button>
    </div>`).join('');
  captionRow.style.display = pendingFiles.length ? 'flex' : 'none';
}
function removeFile(i) { pendingFiles.splice(i,1); renderPreviews(); }

function onJobSelect() {
  // nothing needed — just used at upload time
}

// ── UPLOAD ────────────────────────────────────────────────
async function uploadPhotos() {
  const jobId = document.getElementById('job-select').value;
  const caption = document.getElementById('caption-input').value.trim() || null;
  const msgEl = document.getElementById('upload-msg');
  msgEl.innerHTML = '';

  if (!jobId)            { msgEl.innerHTML = '<div class="msg msg-error">Please select a job first.</div>'; return; }
  if (!pendingFiles.length) { msgEl.innerHTML = '<div class="msg msg-error">No photos selected.</div>'; return; }

  const btn = document.getElementById('btn-upload');
  btn.disabled = true; btn.textContent = 'UPLOADING...';

  const job = myJobs.find(j => j.job_id == jobId);
  const folder = buildFolder(job);
  let successCount = 0;

  for (const file of pendingFiles) {
    const ext  = file.name.split('.').pop() || 'jpg';
    const path = `${folder}/${currentUser.id}_${Date.now()}_${Math.random().toString(36).substring(2,7)}.${ext}`;
    const { error: upErr } = await sb.storage.from(BUCKET).upload(path, file, { contentType: file.type });
    if (!upErr) {
      await sb.from('project_photos').insert({
        job_id: parseInt(jobId), employee_id: currentUser.id,
        storage_path: path, file_name: file.name, caption,
      });
      successCount++;
    }
  }

  pendingFiles = []; renderPreviews();
  document.getElementById('caption-input').value = '';
  btn.disabled = false; btn.textContent = 'UPLOAD';

  msgEl.innerHTML = `<div class="msg msg-success">✓ ${successCount} photo${successCount!==1?'s':''} uploaded!</div>`;
  setTimeout(() => msgEl.innerHTML = '', 3000);
  await loadGallery();
}

// ── GALLERY ───────────────────────────────────────────────
async function loadGallery() {
  const el = document.getElementById('gallery');
  el.innerHTML = '<div class="empty-state">Loading...</div>';

  // fetch photos for jobs I can see
  const jobIds = myJobs.map(j => j.job_id);
  if (!jobIds.length) { el.innerHTML = '<div class="empty-state">No jobs assigned.</div>'; return; }

  const { data: photos, error } = await sb.from('project_photos')
    .select('*').in('job_id', jobIds).order('taken_at', { ascending: false });

  if (error || !photos?.length) {
    el.innerHTML = '<div class="empty-state">No photos yet. Be the first to add one!</div>';
    document.getElementById('photo-count').textContent = '';
    return;
  }

  document.getElementById('photo-count').textContent = `${photos.length} photo${photos.length!==1?'s':''}`;

  // Group by job
  const byJob = {};
  photos.forEach(p => {
    if (!byJob[p.job_id]) byJob[p.job_id] = [];
    byJob[p.job_id].push(p);
  });

  // Get signed URLs in bulk
  const urlMap = {};
  await Promise.all(photos.map(async p => {
    const { data } = await sb.storage.from(BUCKET).createSignedUrl(p.storage_path, 3600);
    if (data?.signedUrl) urlMap[p.photo_id] = data.signedUrl;
  }));

  el.innerHTML = Object.entries(byJob).map(([jobId, jobPhotos]) => {
    const job = myJobs.find(j => j.job_id == jobId);
    const folder = job ? buildFolder(job) : 'Unknown Job';
    const jobName = job ? job.job_name : 'Unknown Job';
    const clientName = job?.client_name || job?.clients?.company_name || '';
    const date = job?.start_date ? new Date(job.start_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';

    const tiles = jobPhotos.map(p => {
      const url = urlMap[p.photo_id] || '';
      const emp = allEmployees.find(e => e.employee_id === p.employee_id);
      const byName = emp ? `${emp.first_name} ${emp.last_name}` : 'Unknown';
      const safeCaption = (p.caption||'').replace(/'/g,"&#39;").replace(/"/g,'&quot;');
      const safeTaken = fmtDT(p.taken_at).replace(/'/g,"&#39;");
      return `<div class="photo-tile" onclick="openLightbox('${url}','${safeCaption}','${byName} · ${safeTaken}',${p.photo_id},'${p.employee_id}')">
        <img src="${url}" loading="lazy" alt="${safeCaption}" />
        <div class="photo-tile-meta">
          <div class="photo-caption">${p.caption || '—'}</div>
          <div class="photo-by">${byName} · ${fmtDT(p.taken_at)}</div>
        </div>
      </div>`;
    }).join('');

    return `<div class="job-group">
      <div class="job-group-header">
        <div class="job-group-name">${jobName}</div>
        <div class="job-group-meta">${[clientName, date, folder].filter(Boolean).join(' · ')}</div>
      </div>
      <div class="photo-grid">${tiles}</div>
    </div>`;
  }).join('');
}

// ── LIGHTBOX ──────────────────────────────────────────────
function openLightbox(url, caption, by, photoId, empId) {
  currentPhoto = { photoId, empId };
  document.getElementById('lb-img').src = url;
  document.getElementById('lb-caption').textContent = caption || '';
  document.getElementById('lb-by').textContent = by;
  const delBtn = document.getElementById('lb-delete');
  delBtn.style.display = (isOwner || empId === currentUser.id) ? 'inline-block' : 'none';
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  currentPhoto = null;
}
async function deletePhoto() {
  if (!currentPhoto) return;
  if (!confirm('Delete this photo?')) return;
  const { data: photo } = await sb.from('project_photos').select('storage_path').eq('photo_id', currentPhoto.photoId).single();
  if (photo) await sb.storage.from(BUCKET).remove([photo.storage_path]);
  await sb.from('project_photos').delete().eq('photo_id', currentPhoto.photoId);
  closeLightbox();
  await loadGallery();
}

// ── INIT ──────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  currentUser = session.user;

  // Check owner
  const { data: perms } = await sb.from('employee_permissions')
    .select('permissions(permission_name)').eq('employee_id', currentUser.id);
  isOwner = perms?.some(p => p.permissions?.permission_name === 'owner') || false;

  // Load employees
  const { data: emps } = await sb.from('employees').select('employee_id,first_name,last_name').eq('is_active',true);
  allEmployees = emps || [];

  // Load jobs — owners see all active, employees see only assigned
  let jobsRes;
  if (isOwner) {
    jobsRes = await sb.from('jobs').select('job_id,job_name,client_name,start_date,status').in('status',['booked','confirmed','completed']).order('start_date',{ascending:false});
  } else {
    const { data: crew } = await sb.from('job_crew').select('job_id').eq('employee_id', currentUser.id);
    const ids = (crew||[]).map(c => c.job_id);
    if (ids.length) {
      jobsRes = await sb.from('jobs').select('job_id,job_name,client_name,start_date,status').in('job_id', ids).order('start_date',{ascending:false});
    } else {
      jobsRes = { data: [] };
    }
  }
  myJobs = jobsRes.data || [];

  // Populate job selector
  const sel = document.getElementById('job-select');
  myJobs.forEach(j => {
    const opt = document.createElement('option');
    opt.value = j.job_id;
    opt.textContent = `${j.job_name}${j.client_name ? ' — ' + j.client_name : ''}`;
    sel.appendChild(opt);
  });

  await loadGallery();
  document.getElementById('loading').style.display = 'none';
}
init();
</script>
</body>
</html>
