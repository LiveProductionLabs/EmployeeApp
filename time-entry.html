<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Time Entry — Live Production Labs</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1e2a3a; --surface: #263447; --surface2: #2f3f55;
      --border: #3a5068; --accent: #38bdf8; --accent2: #818cf8;
      --text: #f0f4f8; --text2: #94a3b8;
      --success: #4ade80; --warning: #fbbf24; --danger: #f87171;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }

    #loading { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 4px; color: var(--accent); }

    .topnav { background: #182230; border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; height: 56px; gap: 12px; position: sticky; top: 0; z-index: 50; }
    .nav-back { background: none; border: 1px solid var(--border); color: var(--text2); font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 12px; border-radius: 6px; cursor: pointer; text-decoration: none; }
    .nav-back:hover { border-color: var(--accent); color: var(--accent); }
    .nav-bar { width: 5px; height: 32px; background: linear-gradient(180deg,var(--accent),var(--accent2)); border-radius: 3px; }
    .nav-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; }
    .nav-right { margin-left: auto; font-size: 11px; color: var(--text2); }
    .nav-right span { color: var(--text); }

    .main { padding: 20px; max-width: 600px; margin: 0 auto; }

    .week-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 20px; display: flex; }
    .week-stat { flex: 1; text-align: center; }
    .week-stat + .week-stat { border-left: 1px solid var(--border); }
    .week-num { font-family: 'Bebas Neue', sans-serif; font-size: 28px; line-height: 1; }
    .week-lbl { font-size: 9px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }
    .num-reg { color: #7dd3fc; } .num-ot { color: var(--warning); } .num-dt { color: var(--danger); } .num-total { color: var(--accent); }

    .btn-add-time { width: 100%; background: linear-gradient(135deg,var(--accent),var(--accent2)); border: none; border-radius: 12px; color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; padding: 18px; cursor: pointer; margin-bottom: 24px; box-shadow: 0 4px 20px #38bdf833; transition: opacity 0.2s; }
    .btn-add-time:hover { opacity: 0.9; }
    .btn-add-time:disabled { opacity: 0.3; cursor: not-allowed; }

    .entries-header { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
    .entry-card { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s; }
    .entry-card:hover { background: var(--surface2); transform: translateX(3px); }
    .entry-card.locked { border-left-color: var(--warning); cursor: default; }
    .entry-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .entry-job { font-size: 13px; color: var(--accent); }
    .entry-date { font-size: 11px; color: var(--text2); }
    .entry-time { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
    .entry-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill { padding: 3px 10px; border-radius: 99px; font-size: 10px; }
    .pill-reg { background: #1e3a5f; color: #7dd3fc; }
    .pill-ot { background: #3d2a00; color: var(--warning); }
    .pill-dt { background: #3b0a0a; color: var(--danger); }
    .entry-notes { font-size: 11px; color: var(--text2); margin-top: 6px; font-style: italic; }
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text2); font-size: 13px; line-height: 1.8; }
    .empty-icon { font-size: 40px; display: block; margin-bottom: 12px; }

    .submit-area { margin-top: 24px; padding-bottom: 40px; }
    .btn-submit { width: 100%; background: none; border: 2px solid var(--accent); color: var(--accent); font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; padding: 14px; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
    .btn-submit:hover { background: var(--accent); color: #fff; }
    .btn-reopen { width: 100%; background: none; border: 2px solid var(--warning); color: var(--warning); font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; padding: 14px; border-radius: 12px; cursor: pointer; margin-top: 10px; }
    .status-banner { padding: 14px; border-radius: 10px; font-size: 12px; margin-top: 12px; text-align: center; }
    .status-submitted { background: #0f291866; border: 1px solid #166534; color: var(--success); }
    .status-locked { background: #1c150566; border: 1px solid #854d0e; color: var(--warning); }

    /* SHEET */
    .sheet-overlay { display: none; position: fixed; inset: 0; background: #000a; z-index: 200; }
    .sheet-overlay.open { display: block; }
    .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 201; background: #1e2e42; border-top: 2px solid var(--border); border-radius: 24px 24px 0 0; padding: 20px 20px 44px; max-width: 600px; margin: 0 auto; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); max-height: 90vh; overflow-y: auto; }
    .bottom-sheet.open { transform: translateY(0); }
    .sheet-handle { width: 44px; height: 5px; background: var(--border); border-radius: 99px; margin: 0 auto 20px; }
    .sheet-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--accent); margin-bottom: 20px; }

    .form-field { margin-bottom: 16px; }
    .form-label { display: block; font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 12px 14px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
    .form-input:focus { border-color: var(--accent); }
    select.form-input option { background: #1e2e42; }

    /* TAP TIME PICKER */
    .pickers-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .picker-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
    .tap-picker { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .tap-row { display: flex; align-items: center; }

    /* Hour & Minute columns */
    .tap-col { flex: 1; display: flex; flex-direction: column; align-items: center; }
    .tap-col + .tap-col { border-left: 1px solid var(--border); }

    .tap-col-label { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; padding: 8px 0 4px; }

    .tap-btn { width: 100%; padding: 12px 0; background: none; border: none; color: var(--accent); font-size: 22px; cursor: pointer; transition: background 0.15s; line-height: 1; }
    .tap-btn:active { background: #38bdf822; }

    .tap-val { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--text); letter-spacing: 2px; padding: 6px 0; min-width: 52px; text-align: center; line-height: 1; }

    .tap-sep { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--text2); padding: 0 2px; align-self: center; margin-top: 28px; }

    /* CALC */
    .calc-row { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
    .calc-item { flex: 1; text-align: center; padding: 12px 4px; border-right: 1px solid var(--border); }
    .calc-item:last-child { border-right: none; }
    .calc-num { font-family: 'Bebas Neue', sans-serif; font-size: 24px; }
    .calc-lbl { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }

    .sheet-actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn-save { flex: 1; background: linear-gradient(135deg,var(--accent),var(--accent2)); border: none; color: #fff; padding: 14px; border-radius: 10px; font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn-cancel-sm { background: none; border: 1px solid var(--border); color: var(--text2); padding: 14px 18px; border-radius: 10px; font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; }
    .btn-del { background: none; border: 1px solid #7f1d1d; color: var(--danger); padding: 14px 16px; border-radius: 10px; cursor: pointer; font-size: 16px; }
  </style>
</head>
<body>
<div id="loading">LOADING...</div>

<nav class="topnav">
  <a class="nav-back" href="index.html">← Hub</a>
  <div class="nav-bar"></div>
  <div class="nav-title">Time Entry</div>
  <div class="nav-right">Week of <span id="nav-week">—</span></div>
</nav>

<div class="main">
  <div class="week-bar">
    <div class="week-stat"><div class="week-num num-reg" id="tot-reg">0.0</div><div class="week-lbl">Reg</div></div>
    <div class="week-stat"><div class="week-num num-ot" id="tot-ot">0.0</div><div class="week-lbl">OT</div></div>
    <div class="week-stat"><div class="week-num num-dt" id="tot-dt">0.0</div><div class="week-lbl">DT</div></div>
    <div class="week-stat"><div class="week-num num-total" id="tot-total">0.0</div><div class="week-lbl">Total</div></div>
  </div>
  <button class="btn-add-time" id="btn-add-time" onclick="openAdd()">+ LOG TIME</button>
  <div class="entries-header" id="entries-header"></div>
  <div id="entries-list"></div>
  <div class="submit-area" id="submit-area"></div>
</div>

<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheet-title">LOG TIME</div>

  <div class="form-field">
    <label class="form-label">Date</label>
    <input class="form-input" type="date" id="f-date" />
  </div>
  <div class="form-field">
    <label class="form-label">Job</label>
    <select class="form-input" id="f-job"></select>
  </div>

  <!-- TIME PICKERS -->
  <div class="pickers-row">
    <div>
      <span class="picker-label">Start Time</span>
      <div class="tap-picker">
        <div class="tap-row">
          <div class="tap-col">
            <div class="tap-col-label">HR</div>
            <button class="tap-btn" onclick="adj('sh',1)">▲</button>
            <div class="tap-val" id="sh-val">08</div>
            <button class="tap-btn" onclick="adj('sh',-1)">▼</button>
          </div>
          <div class="tap-sep">:</div>
          <div class="tap-col">
            <div class="tap-col-label">MIN</div>
            <button class="tap-btn" onclick="adj('sm',1)">▲</button>
            <div class="tap-val" id="sm-val">00</div>
            <button class="tap-btn" onclick="adj('sm',-1)">▼</button>
          </div>
        </div>
      </div>
    </div>
    <div>
      <span class="picker-label">End Time</span>
      <div class="tap-picker">
        <div class="tap-row">
          <div class="tap-col">
            <div class="tap-col-label">HR</div>
            <button class="tap-btn" onclick="adj('eh',1)">▲</button>
            <div class="tap-val" id="eh-val">17</div>
            <button class="tap-btn" onclick="adj('eh',-1)">▼</button>
          </div>
          <div class="tap-sep">:</div>
          <div class="tap-col">
            <div class="tap-col-label">MIN</div>
            <button class="tap-btn" onclick="adj('em',1)">▲</button>
            <div class="tap-val" id="em-val">00</div>
            <button class="tap-btn" onclick="adj('em',-1)">▼</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="form-field">
    <label class="form-label">Break (minutes)</label>
    <input class="form-input" type="number" id="f-break" min="0" value="0" oninput="updateCalc()" />
  </div>

  <div class="calc-row">
    <div class="calc-item"><div class="calc-num num-reg" id="c-reg">—</div><div class="calc-lbl">Reg</div></div>
    <div class="calc-item"><div class="calc-num num-ot" id="c-ot">—</div><div class="calc-lbl">OT</div></div>
    <div class="calc-item"><div class="calc-num num-dt" id="c-dt">—</div><div class="calc-lbl">DT</div></div>
    <div class="calc-item"><div class="calc-num num-total" id="c-total">—</div><div class="calc-lbl">Total</div></div>
  </div>

  <div class="form-field">
    <label class="form-label">Notes (optional)</label>
    <input class="form-input" type="text" id="f-notes" placeholder="e.g. Load in, show night..." />
  </div>

  <div class="sheet-actions">
    <button class="btn-del" id="btn-del" style="display:none" onclick="deleteEntry()">🗑</button>
    <button class="btn-cancel-sm" onclick="closeSheet()">Cancel</button>
    <button class="btn-save" onclick="saveEntry()">Save Entry</button>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://xfpgbjxavymtfmfobecc.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmcGdianhhdnltdGZtZm9iZWNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMTkzODgsImV4cCI6MjA4ODY5NTM4OH0.cDc9jrafj6PnpDE7OTcgujKrHjb5NMdQWPi7EmFMomY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser=null, jobs=[], entries=[], sheet=null;
let payRules={ot_threshold:8,dt_threshold:12};
let editingId=null, weekDates=[];

// Time state: hours & minutes for start/end
let T = { sh:8, sm:0, eh:17, em:0 };

const MINS = [0,15,30,45];

function pad(n){ return String(n).padStart(2,'0'); }

function getStartVal(){ return `${pad(T.sh)}:${pad(T.sm)}`; }
function getEndVal(){   return `${pad(T.eh)}:${pad(T.em)}`; }

function adj(field, dir) {
  if(field==='sh'){ T.sh=(T.sh+dir+24)%24; }
  if(field==='eh'){ T.eh=(T.eh+dir+24)%24; }
  if(field==='sm'){
    const i=MINS.indexOf(T.sm);
    T.sm=MINS[(i+dir+4)%4];
  }
  if(field==='em'){
    const i=MINS.indexOf(T.em);
    T.em=MINS[(i+dir+4)%4];
  }
  document.getElementById('sh-val').textContent=pad(T.sh);
  document.getElementById('sm-val').textContent=pad(T.sm);
  document.getElementById('eh-val').textContent=pad(T.eh);
  document.getElementById('em-val').textContent=pad(T.em);
  updateCalc();
}

function setTime(startStr, endStr){
  const [sh,sm]=startStr.split(':').map(Number);
  const [eh,em]=endStr.split(':').map(Number);
  T.sh=sh; T.sm=sm; T.eh=eh; T.em=em;
  // snap minutes to nearest 15
  T.sm=MINS.reduce((a,b)=>Math.abs(b-T.sm)<Math.abs(a-T.sm)?b:a);
  T.em=MINS.reduce((a,b)=>Math.abs(b-T.em)<Math.abs(a-T.em)?b:a);
  document.getElementById('sh-val').textContent=pad(T.sh);
  document.getElementById('sm-val').textContent=pad(T.sm);
  document.getElementById('eh-val').textContent=pad(T.eh);
  document.getElementById('em-val').textContent=pad(T.em);
}

function calcHours(s,e,brk){
  if(!s||!e) return null;
  let [sh,sm]=s.split(':').map(Number);
  let [eh,em]=e.split(':').map(Number);
  let sM=sh*60+sm, eM=eh*60+em;
  if(eM<=sM) eM+=1440;
  let total=Math.max((eM-sM-(brk||0))/60,0);
  const ot=payRules.ot_threshold, dt=payRules.dt_threshold;
  return {
    regular:+Math.min(total,ot).toFixed(2),
    ot:+Math.min(Math.max(total-ot,0),dt-ot).toFixed(2),
    dt:+Math.max(total-dt,0).toFixed(2),
    total:+total.toFixed(2)
  };
}

function updateCalc(){
  const brk=parseInt(document.getElementById('f-break').value)||0;
  const h=calcHours(getStartVal(),getEndVal(),brk);
  if(!h) return;
  document.getElementById('c-reg').textContent=h.regular+'h';
  document.getElementById('c-ot').textContent=h.ot+'h';
  document.getElementById('c-dt').textContent=h.dt+'h';
  document.getElementById('c-total').textContent=h.total+'h';
}

function openAdd(){
  editingId=null;
  document.getElementById('sheet-title').textContent='LOG TIME';
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('f-job').value='';
  document.getElementById('f-break').value='0';
  document.getElementById('f-notes').value='';
  document.getElementById('btn-del').style.display='none';
  setTime('08:00','17:00');
  updateCalc();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}

function openEditById(id){
  const e=entries.find(x=>x.entry_id===id);
  if(!e) return;
  editingId=id;
  document.getElementById('sheet-title').textContent='EDIT ENTRY';
  document.getElementById('f-date').value=e.entry_date;
  document.getElementById('f-job').value=e.job_id;
  document.getElementById('f-break').value=e.break_minutes||0;
  document.getElementById('f-notes').value=e.notes||'';
  document.getElementById('btn-del').style.display='block';
  setTime(e.start_time?.slice(0,5)||'08:00', e.end_time?.slice(0,5)||'17:00');
  updateCalc();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}

function closeSheet(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

async function saveEntry(){
  const date=document.getElementById('f-date').value;
  const jobId=parseInt(document.getElementById('f-job').value);
  const brk=parseInt(document.getElementById('f-break').value)||0;
  const notes=document.getElementById('f-notes').value;
  if(!date||!jobId){alert('Please select a date and job.');return;}
  const s=getStartVal(), e=getEndVal();
  const h=calcHours(s,e,brk);
  const payload={
    employee_id:currentUser.id, job_id:jobId, entry_date:date,
    start_time:s, end_time:e, break_minutes:brk,
    is_overnight:e<=s,
    total_hours:h.total, regular_hours:h.regular, ot_hours:h.ot, dt_hours:h.dt,
    notes:notes||null
  };
  if(editingId){ await sb.from('time_entries').update(payload).eq('entry_id',editingId); }
  else { await sb.from('time_entries').insert(payload); }
  closeSheet();
  await loadEntries();
}

async function deleteEntry(){
  if(!editingId||!confirm('Delete this entry?')) return;
  await sb.from('time_entries').delete().eq('entry_id',editingId);
  closeSheet();
  await loadEntries();
}

async function submitSheet(){
  if(!confirm('Submit this week for review?')) return;
  if(sheet){ await sb.from('time_sheets').update({status:'submitted',submitted_at:new Date().toISOString()}).eq('sheet_id',sheet.sheet_id); }
  else { await sb.from('time_sheets').insert({employee_id:currentUser.id,week_start_date:weekDates[0],week_end_date:weekDates[6],status:'submitted',submitted_at:new Date().toISOString()}); }
  await loadSheet();
}

async function reopenSheet(){
  if(!sheet) return;
  await sb.from('time_sheets').update({status:'open',reopened_at:new Date().toISOString()}).eq('sheet_id',sheet.sheet_id);
  await loadSheet();
}

function renderEntries(){
  const isLocked=sheet?.status==='locked';
  const isSubmitted=sheet?.status==='submitted';
  const canEdit=!isLocked&&!isSubmitted;
  document.getElementById('btn-add-time').disabled=isLocked||isSubmitted;
  const list=document.getElementById('entries-list');
  const hdr=document.getElementById('entries-header');
  if(entries.length===0){
    hdr.textContent='';
    list.innerHTML=`<div class="empty-state"><span class="empty-icon">⏱</span>No entries this week yet.<br>Tap <strong>+ LOG TIME</strong> to start.</div>`;
  } else {
    hdr.textContent=`This Week — ${entries.length} entr${entries.length===1?'y':'ies'}`;
    list.innerHTML=[...entries].sort((a,b)=>a.entry_date>b.entry_date?1:-1).map(e=>{
      const job=jobs.find(j=>j.job_id===e.job_id);
      const h=calcHours(e.start_time,e.end_time,e.break_minutes);
      const ds=new Date(e.entry_date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      return `<div class="entry-card${isLocked?' locked':''}" ${canEdit?`onclick="openEditById(${e.entry_id})"`:''}>
        <div class="entry-top"><div class="entry-job">${job?.job_name||'—'}</div><div class="entry-date">${ds}</div></div>
        <div class="entry-time">${e.start_time?.slice(0,5)} → ${e.end_time?.slice(0,5)}${e.break_minutes>0?` · ${e.break_minutes}min break`:''}</div>
        <div class="entry-pills">
          ${h?.regular>0?`<span class="pill pill-reg">${h.regular}h reg</span>`:''}
          ${h?.ot>0?`<span class="pill pill-ot">${h.ot}h OT</span>`:''}
          ${h?.dt>0?`<span class="pill pill-dt">${h.dt}h DT</span>`:''}
        </div>
        ${e.notes?`<div class="entry-notes">${e.notes}</div>`:''}
      </div>`;
    }).join('');
  }
  const tot=entries.reduce((a,e)=>{const h=calcHours(e.start_time,e.end_time,e.break_minutes);if(h){a.regular+=h.regular;a.ot+=h.ot;a.dt+=h.dt;a.total+=h.total;}return a;},{regular:0,ot:0,dt:0,total:0});
  document.getElementById('tot-reg').textContent=tot.regular.toFixed(1);
  document.getElementById('tot-ot').textContent=tot.ot.toFixed(1);
  document.getElementById('tot-dt').textContent=tot.dt.toFixed(1);
  document.getElementById('tot-total').textContent=tot.total.toFixed(1);
  const area=document.getElementById('submit-area');
  if(entries.length>0){
    if(isLocked) area.innerHTML=`<div class="status-banner status-locked">🔒 Locked by accounting.</div>`;
    else if(isSubmitted) area.innerHTML=`<div class="status-banner status-submitted">✓ Submitted — pending review.</div><button class="btn-reopen" onclick="reopenSheet()">↩ REOPEN WEEK</button>`;
    else area.innerHTML=`<button class="btn-submit" onclick="submitSheet()">SUBMIT WEEK</button>`;
  } else { area.innerHTML=''; }
}

function getWeekDates(){
  const d=new Date(),day=d.getDay(),mon=new Date(d);
  mon.setDate(d.getDate()-(day===0?6:day-1));
  return Array.from({length:7},(_,i)=>{const dd=new Date(mon);dd.setDate(mon.getDate()+i);return dd.toISOString().split('T')[0];});
}

async function loadEntries(){
  const {data}=await sb.from('time_entries').select('*').eq('employee_id',currentUser.id).gte('entry_date',weekDates[0]).lte('entry_date',weekDates[6]);
  entries=data||[];renderEntries();
}

async function loadSheet(){
  const {data}=await sb.from('time_sheets').select('*').eq('employee_id',currentUser.id).eq('week_start_date',weekDates[0]).maybeSingle();
  sheet=data||null;renderEntries();
}

async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  currentUser=session.user;
  weekDates=getWeekDates();
  document.getElementById('nav-week').textContent=weekDates[0];
  const {data:rules}=await sb.from('pay_rules').select('*').maybeSingle();
  if(rules) payRules=rules;
  const {data:jobData}=await sb.from('jobs').select('job_id,job_name').in('status',['booked','completed']).order('job_name');
  jobs=jobData||[];
  const sel=document.getElementById('f-job');
  sel.innerHTML='<option value="">— Select a Job —</option>';
  jobs.forEach(j=>{const o=document.createElement('option');o.value=j.job_id;o.textContent=j.job_name;sel.appendChild(o);});
  await loadEntries();
  await loadSheet();
  document.getElementById('loading').style.display='none';
}
init();
</script>
