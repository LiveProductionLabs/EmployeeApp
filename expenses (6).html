  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1e2a3a; --surface: #263447; --surface2: #2f3f55;
      --border: #3a5068; --accent: #38bdf8; --accent2: #818cf8;
      --text: #f0f4f8; --text2: #94a3b8;
      --success: #4ade80; --warning: #fbbf24; --danger: #f87171;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
    #loading { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 4px; color: var(--accent); }
    .topnav { background: #182230; border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; height: 56px; gap: 12px; position: sticky; top: 0; z-index: 50; }
    .nav-back { background: none; border: 1px solid var(--border); color: var(--text2); font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 12px; border-radius: 6px; cursor: pointer; text-decoration: none; }
    .nav-back:hover { border-color: var(--accent); color: var(--accent); }
    .nav-bar { width: 5px; height: 32px; background: linear-gradient(180deg,var(--accent),var(--accent2)); border-radius: 3px; }
    .nav-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; }
    .main { padding: 20px; max-width: 600px; margin: 0 auto; padding-bottom: 60px; }

    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--accent); margin-bottom: 14px; }

    /* ADD FORM */
    .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 28px; }
    .form-field { margin-bottom: 14px; }
    .form-label { display: block; font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 11px 14px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
    .form-input:focus { border-color: var(--accent); }
    select.form-input option { background: #1e2e42; }
    textarea.form-input { resize: vertical; min-height: 70px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* RECEIPT UPLOAD */
    .upload-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; transition: border-color 0.2s; position: relative; }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #1e2e42; }
    .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { font-size: 28px; margin-bottom: 6px; }
    .upload-text { font-size: 12px; color: var(--text2); }
    .upload-text span { color: var(--accent); }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 12px; }
    .preview-item { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 1; background: var(--bg); }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .preview-item .remove-btn { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.7); border: none; color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .preview-item .file-name { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); font-size: 9px; padding: 2px 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .btn-submit { width: 100%; background: linear-gradient(135deg,var(--accent),var(--accent2)); border: none; border-radius: 10px; color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; padding: 16px; cursor: pointer; margin-top: 4px; }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .msg { padding: 12px 16px; border-radius: 8px; font-size: 12px; margin-top: 12px; display: none; }
    .msg-success { background: #0f291866; border: 1px solid #166534; color: var(--success); }
    .msg-error   { background: #3b0a0a66; border: 1px solid #7f1d1d; color: var(--danger); }

    /* EXPENSE HISTORY */
    .expense-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
    .expense-top { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    .expense-amount { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--accent); }
    .expense-cat { font-size: 10px; padding: 3px 10px; border-radius: 99px; background: var(--surface2); color: var(--text2); }
    .expense-meta { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
    .expense-desc { font-size: 12px; color: var(--text); }
    .badge-submitted { background: #3d2a00; color: var(--warning); font-size: 10px; padding: 3px 10px; border-radius: 99px; }
    .badge-approved  { background: #0f2918; color: var(--success); font-size: 10px; padding: 3px 10px; border-radius: 99px; }
    .badge-rejected  { background: #3b0a0a66; color: var(--danger); font-size: 10px; padding: 3px 10px; border-radius: 99px; }
    .attachments-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .attach-thumb { width: 56px; height: 56px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
    .attach-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .attach-file { display: flex; align-items: center; gap: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 11px; cursor: pointer; text-decoration: none; color: var(--accent); }

    .empty-state { text-align: center; padding: 32px 20px; color: var(--text2); font-size: 12px; }

    /* LIGHTBOX */
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 300; display: none; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 8px; }
    .lightbox-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; }
  </style>
</head>
<body>
<div id="loading">LOADING...</div>

<nav class="topnav">
  <a class="nav-back" href="index.html">← Hub</a>
  <div class="nav-bar"></div>
  <div class="nav-title">Expenses</div>
</nav>

<div class="main">

  <div class="section-title">Submit Expense</div>
  <div class="form-card">
    <div class="two-col">
      <div class="form-field">
        <label class="form-label">Date <span style="color:var(--danger)">*</span></label>
        <input class="form-input" type="date" id="exp-date" />
      </div>
      <div class="form-field">
        <label class="form-label">Amount <span style="color:var(--danger)">*</span></label>
        <input class="form-input" type="number" step="0.01" id="exp-amount" placeholder="0.00" />
      </div>
    </div>
    <div class="two-col">
      <div class="form-field">
        <label class="form-label">Category <span style="color:var(--danger)">*</span></label>
        <select class="form-input" id="exp-category">
          <option value="">— Select —</option>
          <option>Meals</option>
          <option>Transportation</option>
          <option>Supplies</option>
          <option>Equipment Rental</option>
          <option>Parking / Tolls</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">Job <span style="color:var(--text2);font-size:9px">optional</span></label>
        <select class="form-input" id="exp-job">
          <option value="">— No Job —</option>
        </select>
      </div>
    </div>
    <div class="form-field">
      <label class="form-label">Description</label>
      <textarea class="form-input" id="exp-desc" placeholder="What was this for?"></textarea>
    </div>
    <div class="form-field">
      <label class="form-label">Receipts</label>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="image/*,application/pdf" multiple onchange="handleFiles(this.files)" />
        <div class="upload-icon">📎</div>
        <div class="upload-text">Tap to add receipts<br/><span>photos or PDFs</span></div>
      </div>
      <div class="preview-grid" id="preview-grid"></div>
    </div>
    <div class="msg msg-error"   id="form-error"></div>
    <div class="msg msg-success" id="form-success"></div>
    <button class="btn-submit" id="btn-submit" onclick="submitExpense()">SUBMIT EXPENSE</button>
  </div>

  <div class="section-title">My Expenses</div>
  <div id="expenses-list"><div class="empty-state">Loading...</div></div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="Receipt" />
</div>

<script>
const SUPABASE_URL  = 'https://xfpgbjxavymtfmfobecc.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmcGdianhhdnltdGZtZm9iZWNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMTkzODgsImV4cCI6MjA4ODY5NTM4OH0.cDc9jrafj6PnpDE7OTcgujKrHjb5NMdQWPi7EmFMomY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const BUCKET = 'expense-receipts';

let currentUser = null;
let pendingFiles = [];

// ── INIT ──────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  currentUser = session.user;

  // Set today's date
  document.getElementById('exp-date').value = new Date().toISOString().split('T')[0];

  // Load jobs for dropdown
  const { data: jobs } = await sb.from('jobs').select('job_id, job_name').in('status',['booked','confirmed']).order('start_date', { ascending: false });
  const sel = document.getElementById('exp-job');
  (jobs||[]).forEach(j => sel.innerHTML += `<option value="${j.job_id}">${j.job_name}</option>`);

  await loadExpenses();
  document.getElementById('loading').style.display = 'none';
}

// ── FILE HANDLING ─────────────────────────────────────────
function handleFiles(files) {
  [...files].forEach(file => {
    if (pendingFiles.length >= 5) return;
    pendingFiles.push(file);
  });
  renderPreviews();
  document.getElementById('file-input').value = '';
}

function renderPreviews() {
  const grid = document.getElementById('preview-grid');
  grid.innerHTML = pendingFiles.map((f, i) => {
    const isImg = f.type.startsWith('image/');
    const url = isImg ? URL.createObjectURL(f) : null;
    return `<div class="preview-item">
      ${isImg ? `<img src="${url}" />` : `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:24px">📄</div>`}
      <div class="file-name">${f.name}</div>
      <button class="remove-btn" onclick="removeFile(${i})">✕</button>
    </div>`;
  }).join('');
}

function removeFile(i) { pendingFiles.splice(i, 1); renderPreviews(); }

// ── SUBMIT ────────────────────────────────────────────────
async function submitExpense() {
  const date     = document.getElementById('exp-date').value;
  const amount   = parseFloat(document.getElementById('exp-amount').value);
  const category = document.getElementById('exp-category').value;
  const jobId    = document.getElementById('exp-job').value || null;
  const desc     = document.getElementById('exp-desc').value.trim() || null;

  document.getElementById('form-error').style.display = 'none';
  document.getElementById('form-success').style.display = 'none';

  if (!date || !amount || !category) {
    document.getElementById('form-error').textContent = 'Date, amount, and category are required.';
    document.getElementById('form-error').style.display = 'block';
    return;
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = 'SAVING...';

  // Insert expense
  const { data: expense, error } = await sb.from('expenses').insert({
    employee_id: currentUser.id, job_id: jobId, expense_date: date,
    category, amount, description: desc, status: 'submitted',
  }).select().single();

  if (error) {
    document.getElementById('form-error').textContent = error.message;
    document.getElementById('form-error').style.display = 'block';
    btn.disabled = false; btn.textContent = 'SUBMIT EXPENSE';
    return;
  }

  // Upload files
  for (const file of pendingFiles) {
    const ext  = file.name.split('.').pop();
    const path = `${currentUser.id}/${expense.expense_id}/${Date.now()}_${file.name}`;
    const { error: uploadErr } = await sb.storage.from(BUCKET).upload(path, file);
    if (!uploadErr) {
      await sb.from('expense_attachments').insert({
        expense_id: expense.expense_id, file_name: file.name,
        storage_path: path, file_size: file.size, mime_type: file.type,
      });
    }
  }

  // Reset form
  ['exp-amount','exp-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('exp-category').value = '';
  document.getElementById('exp-job').value = '';
  document.getElementById('exp-date').value = new Date().toISOString().split('T')[0];
  pendingFiles = []; renderPreviews();

  document.getElementById('form-success').textContent = 'Expense submitted!';
  document.getElementById('form-success').style.display = 'block';
  btn.disabled = false; btn.textContent = 'SUBMIT EXPENSE';
  await loadExpenses();
}

// ── LOAD MY EXPENSES ──────────────────────────────────────
async function loadExpenses() {
  const { data: expenses } = await sb.from('expenses')
    .select('*, expense_attachments(*), jobs(job_name)')
    .eq('employee_id', currentUser.id)
    .order('expense_date', { ascending: false });

  const el = document.getElementById('expenses-list');
  if (!expenses?.length) { el.innerHTML = '<div class="empty-state">No expenses yet.</div>'; return; }

  el.innerHTML = (await Promise.all(expenses.map(async exp => {
    const badgeCls = { submitted:'badge-submitted', approved:'badge-approved', rejected:'badge-rejected' }[exp.status] || 'badge-submitted';
    const attachHtml = await Promise.all((exp.expense_attachments||[]).map(async att => {
      const { data } = await sb.storage.from(BUCKET).createSignedUrl(att.storage_path, 300);
      const url = data?.signedUrl || '#';
      const isImg = att.mime_type?.startsWith('image/');
      return isImg
        ? `<div class="attach-thumb" onclick="openLightbox('${url}')"><img src="${url}" /></div>`
        : `<a class="attach-file" href="${url}" target="_blank">📄 ${att.file_name}</a>`;
    }));
    return `<div class="expense-card">
      <div class="expense-top">
        <div class="expense-amount">$${parseFloat(exp.amount).toFixed(2)}</div>
        <div class="expense-cat">${exp.category}</div>
        <div style="flex:1"></div>
        <span class="${badgeCls}">${exp.status}</span>
      </div>
      <div class="expense-meta">${exp.expense_date}${exp.jobs ? ' · ' + exp.jobs.job_name : ''}</div>
      ${exp.description ? `<div class="expense-desc">${exp.description}</div>` : ''}
      ${attachHtml.length ? `<div class="attachments-row">${attachHtml.join('')}</div>` : ''}
    </div>`;
  }))).join('');
}

function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

init();
</script>
</body>
</html>
